services:
  db:
    image: mysql:8.0
    container_name: ai_assistant_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ai_assistant
      MYSQL_USER: ai_assistant
      MYSQL_PASSWORD: 123456
      TZ: Asia/Shanghai
    command: --default-time-zone=+08:00   # 强制设置时区为北京时间
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ai_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ai_assistant_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=ai_assistant
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=ai_assistant
    volumes:
      - ./chroma_rag_db:/app/chroma_rag_db
      - ./chroma_memory_db:/app/chroma_memory_db
      - ./docs:/app/docs
      - ./cache:/app/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai_network

volumes:
  mysql_data:

networks:
  ai_network:
    driver: bridge